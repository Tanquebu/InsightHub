name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: insighthub
          POSTGRES_PASSWORD: insighthub
          POSTGRES_DB: insighthub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U insighthub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://insighthub:insighthub@localhost:5432/insighthub
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      JWT_SECRET_KEY: ci-only-secret-not-for-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      REDIS_URL: memory://
      RATE_LIMIT_PER_MINUTE: "60"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Configure Poetry (no in-project virtualenv)
        run: poetry config virtualenvs.create false

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff
        run: poetry run ruff check app/ tests/

      - name: Black (check only)
        run: poetry run black --check app/ tests/

      - name: Mypy
        run: poetry run mypy app/

      - name: Alembic upgrade head
        run: poetry run alembic upgrade head

      - name: Pytest with coverage
        run: poetry run pytest tests/ -q --cov=app --cov-report=term-missing --cov-fail-under=70
